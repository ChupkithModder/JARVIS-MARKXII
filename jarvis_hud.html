<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>J.A.R.V.I.S  MARK XII</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --arc:#00b8ff;--arc2:#0066cc;--arc3:#003366;
  --holo:#00ffe0;--holo2:#00cc99;
  --core:#e8f4ff;--dim:#0a1520;--panel:rgba(0,15,30,0.75);
  --gold:#f0c040;--red:#ff3030;--amber:#ffa020;--green:#00e070;--purple:#8855ff;
  --bg:#020a12;
  --glow:0 0 10px var(--arc),0 0 30px rgba(0,180,255,.2);
  --glow-holo:0 0 10px var(--holo),0 0 30px rgba(0,255,220,.15);
  --font-head:'Orbitron',sans-serif;
  --font-body:'Rajdhani',sans-serif;
  --font-data:'Exo 2',sans-serif;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--arc);
  font-family:var(--font-body);user-select:none;font-weight:400}
#atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1200px 500px at 20% 10%, rgba(0,120,220,.12), transparent 60%),
    radial-gradient(900px 420px at 85% 80%, rgba(0,255,220,.08), transparent 60%),
    linear-gradient(180deg, rgba(0,20,40,.2), transparent 50%, rgba(0,10,20,.3));
  animation:fadeIn 1.2s ease}

/*  GLOBAL ANIMATIONS  */
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes spinR{to{transform:translate(-50%,-50%) rotate(-360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes breathe{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanV{0%{top:-2px}100%{top:100%}}
@keyframes dataStream{0%{background-position:0 0}100%{background-position:0 200px}}
@keyframes glitch{0%,92%,100%{opacity:1;transform:none}93%{opacity:.7;transform:skewX(-2deg)}95%{opacity:.85;transform:skewX(1deg)}97%{opacity:.7;transform:none}}
@keyframes ringPulse{0%,100%{box-shadow:0 0 15px var(--arc),0 0 40px rgba(0,180,255,.15)}50%{box-shadow:0 0 30px var(--arc),0 0 80px rgba(0,180,255,.3)}}
@keyframes hexFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-6px) rotate(3deg)}}
@keyframes borderChase{0%{background-position:0 0}100%{background-position:200% 0}}
@keyframes bootGridDrift{0%{transform:translateY(0)}100%{transform:translateY(26px)}}
@keyframes bootOrbitSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes bootCorePulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.86}50%{transform:translate(-50%,-50%) scale(1.16);opacity:1}}
@keyframes bootNodePop{0%{opacity:0;transform:scale(.4)}100%{opacity:.95;transform:scale(1)}}
@keyframes bootFlash{0%{opacity:0}30%{opacity:.24}100%{opacity:0}}
@keyframes hudRise{0%{opacity:0;transform:translateY(22px) scale(.985)}100%{opacity:1;transform:translateY(0) scale(1)}}

/*  SCANLINE  */
#scanline{position:fixed;top:0;left:0;width:100%;height:2px;pointer-events:none;z-index:99;
  background:linear-gradient(transparent,rgba(0,180,255,.2),transparent);
  animation:scanV 5s linear infinite}

/*  NOISE OVERLAY  */
#noise{position:fixed;inset:0;z-index:98;pointer-events:none;opacity:.03;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px}

/*  BOOT  */
#boot{position:fixed;inset:0;background:#010508;z-index:300;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;transition:opacity .8s;overflow:hidden}
#boot.done{opacity:0;pointer-events:none}
#boot-grid{position:absolute;inset:-20% -20% auto -20%;height:160%;opacity:.42;pointer-events:none;
  background:
    repeating-linear-gradient(90deg, rgba(28,120,220,.18) 0 1px, transparent 1px 32px),
    repeating-linear-gradient(0deg, rgba(28,120,220,.16) 0 1px, transparent 1px 24px);
  transform-origin:center top;transform:perspective(900px) rotateX(62deg);
  animation:bootGridDrift 2.4s linear infinite}
#boot-orbit{position:absolute;top:50%;left:50%;width:400px;height:400px;border-radius:50%;
  border:1px solid rgba(25,200,255,.14);transform:translate(-50%,-50%);pointer-events:none}
#boot-orbit::before,#boot-orbit::after{content:'';position:absolute;inset:24px;border-radius:50%;
  border:1px solid rgba(42,255,234,.18);animation:bootOrbitSpin 5.2s linear infinite}
#boot-orbit::after{inset:56px;border-color:rgba(25,140,255,.24);animation-direction:reverse;animation-duration:4s}
#boot-core{position:absolute;top:50%;left:50%;width:72px;height:72px;border-radius:50%;
  background:radial-gradient(circle,#f4fdff 0%,#63e8ff 24%,#1b86d9 56%,rgba(8,30,56,.9) 100%);
  box-shadow:0 0 26px rgba(30,190,255,.65),0 0 64px rgba(30,190,255,.32);
  transform:translate(-50%,-50%);animation:bootCorePulse 1.3s ease-in-out infinite;pointer-events:none}
#boot-nodes{position:absolute;inset:0;pointer-events:none}
.boot-node{position:absolute;width:7px;height:7px;border-radius:50%;
  background:var(--holo);box-shadow:0 0 9px rgba(42,255,234,.8);opacity:0;
  animation:bootNodePop .45s ease forwards}
#boot-logo{font-family:var(--font-head);font-size:42px;font-weight:900;letter-spacing:22px;
  color:var(--arc);text-shadow:var(--glow);opacity:0;position:relative;z-index:3}
#boot-sub{font-family:var(--font-data);font-size:10px;letter-spacing:8px;color:var(--arc2);
  font-weight:200;opacity:0;position:relative;z-index:3}
#boot-bar-wrap{width:460px;height:3px;background:rgba(0,60,120,.3);border-radius:1px;position:relative;z-index:3}
#boot-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--arc),var(--holo));
  box-shadow:0 0 12px var(--arc);border-radius:1px;transition:width .2s}
#boot-msg{font-family:var(--font-data);font-size:10px;letter-spacing:3px;color:var(--arc3);
  font-weight:300;height:16px;opacity:0;position:relative;z-index:3}
.boot-flash{position:fixed;inset:0;z-index:290;pointer-events:none;
  background:radial-gradient(circle at 50% 42%, rgba(220,245,255,.42), rgba(36,130,255,.2) 25%, transparent 62%);
  opacity:0;animation:bootFlash .32s ease}
.boot-hex{position:absolute;border:1px solid rgba(0,120,200,.06);width:50px;height:50px;
  transform:rotate(45deg);animation:hexFloat 6s ease-in-out infinite}

/*  CORNER BRACKETS  */
.corner{position:fixed;width:36px;height:36px;pointer-events:none;z-index:10}
.corner::before,.corner::after{content:'';position:absolute;background:var(--arc);
  box-shadow:0 0 8px rgba(0,180,255,.4)}
.corner::before{width:2px;height:36px}.corner::after{width:36px;height:2px}
.corner.tl{top:6px;left:6px}.corner.tr{top:6px;right:6px;transform:scaleX(-1)}
.corner.bl{bottom:6px;left:6px;transform:scaleY(-1)}.corner.br{bottom:6px;right:6px;transform:scale(-1)}

/*  MAIN GRID  */
#hud{width:100%;height:100%;display:grid;
  grid-template-columns:220px 1fr 220px;
  grid-template-rows:50px 1fr 44px;
  position:relative;z-index:1;opacity:0;transition:opacity .6s}
#hud.visible{opacity:1;animation:hudRise .72s cubic-bezier(.18,.7,.1,1) both}
#hud.visible #header{animation:hudRise .55s ease both}
#hud.visible #panel-l{animation:hudRise .68s ease both}
#hud.visible #center{animation:hudRise .78s ease both}
#hud.visible #panel-r{animation:hudRise .88s ease both}
#hud.visible #footer{animation:hudRise .98s ease both}

/*  HEADER  */
#header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid rgba(0,120,200,.2);
  background:linear-gradient(180deg,rgba(0,20,40,.5),transparent)}
.h-left{display:flex;align-items:center;gap:14px}
.h-title{font-family:var(--font-head);font-size:16px;font-weight:800;letter-spacing:12px;
  color:var(--arc);text-shadow:var(--glow);animation:glitch 12s infinite}
.h-mark{font-family:var(--font-data);font-size:8px;letter-spacing:5px;color:var(--arc2);
  font-weight:200;margin-top:2px}
.h-status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.h-right{display:flex;align-items:center;gap:20px}
.h-clock{font-family:var(--font-head);font-size:22px;font-weight:500;color:var(--arc);
  text-shadow:var(--glow);letter-spacing:3px}
.h-date{font-family:var(--font-data);font-size:9px;color:var(--arc2);letter-spacing:2px;
  text-align:right;font-weight:300}
#threat-banner{position:fixed;top:52px;left:50%;transform:translateX(-50%);
  background:rgba(255,30,20,.08);border:1px solid var(--red);padding:5px 24px;
  font-family:var(--font-data);font-size:9px;letter-spacing:4px;color:var(--red);
  display:none;z-index:50;animation:pulse 1.2s infinite}

/*  PANELS  */
.panel{padding:10px 12px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;
  overflow-x:hidden;background:var(--panel);backdrop-filter:blur(8px)}
.panel::-webkit-scrollbar{width:2px}
.panel::-webkit-scrollbar-thumb{background:var(--arc3);border-radius:2px}
#panel-l{grid-column:1;grid-row:2;border-right:1px solid rgba(0,80,160,.2)}
#panel-r{grid-column:3;grid-row:2;border-left:1px solid rgba(0,80,160,.2)}

.section-title{font-family:var(--font-data);font-size:8px;letter-spacing:4px;color:var(--arc2);
  font-weight:300;border-bottom:1px solid rgba(0,80,160,.2);padding-bottom:3px;margin-bottom:4px}

/*  BAR ROWS  */
.bar-row{margin-bottom:4px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;color:var(--arc2);
  margin-bottom:2px;font-weight:400}
.bar-label .val{color:var(--core);font-weight:500}
.bar-track{height:3px;background:rgba(0,50,100,.3);border-radius:2px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--arc),var(--holo));
  box-shadow:0 0 6px var(--arc);transition:width .8s ease}
.bar-fill.warn{background:linear-gradient(90deg,var(--amber),#ff8800);box-shadow:0 0 6px var(--amber)}
.bar-fill.crit{background:linear-gradient(90deg,var(--red),#cc0000);box-shadow:0 0 6px var(--red)}

.stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--arc2);
  padding:1px 0;font-weight:400}
.stat-row .val{color:var(--core);font-weight:500}

/*  CENTER  */
#center{grid-column:2;grid-row:2;display:flex;align-items:center;justify-content:center;
  flex-direction:column;position:relative}
#project-backboard{
  position:absolute;inset:20px 40px auto 40px;height:150px;z-index:1;
  border:1px solid rgba(0,90,170,.22);border-radius:6px;
  background:linear-gradient(180deg, rgba(0,25,45,.45), rgba(0,10,20,.25));
  box-shadow:inset 0 0 30px rgba(0,120,220,.08), 0 0 22px rgba(0,80,140,.1);
  backdrop-filter:blur(2px);
  overflow:hidden;
}
#project-backboard::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(0,140,220,.04) 0, rgba(0,140,220,.04) 1px, transparent 1px, transparent 18px);
}
.pb-head{
  position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;
  padding:7px 10px;border-bottom:1px solid rgba(0,90,170,.22);
  font-family:var(--font-data);font-size:9px;letter-spacing:2px;color:var(--arc2)
}
.pb-head .val{color:var(--holo)}
#project-bullets{position:relative;z-index:2;padding:7px 10px;display:flex;flex-direction:column;gap:5px}
.pb-line{
  font-family:var(--font-data);font-size:9px;letter-spacing:1px;color:var(--core);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.85
}
.pb-metrics{display:flex;gap:10px;padding:0 10px 6px;position:relative;z-index:2}
.pb-metric{font-family:var(--font-data);font-size:8px;letter-spacing:1px;color:var(--arc2)}
.pb-metric .val{color:var(--holo)}
#mission-rail{height:5px;margin:0 10px 6px;border:1px solid rgba(40,130,220,.28);background:rgba(0,30,55,.45);border-radius:3px;overflow:hidden;position:relative;z-index:2}
#mission-fill{height:100%;width:0;background:linear-gradient(90deg,#17d3ff,#2affea);box-shadow:0 0 10px rgba(23,211,255,.45);transition:width .35s ease}
.trace-board{margin-top:2px;max-height:120px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.trace-board::-webkit-scrollbar{width:2px}
.trace-board::-webkit-scrollbar-thumb{background:var(--arc3);border-radius:2px}
.trace-item{border:1px solid rgba(40,120,210,.24);background:rgba(0,22,42,.42);padding:4px 6px;border-radius:2px}
.trace-head{display:flex;justify-content:space-between;align-items:center;font-size:7px;letter-spacing:1px;color:var(--arc2);font-family:var(--font-data)}
.trace-text{font-size:9px;color:var(--core);font-family:var(--font-data);line-height:1.35}

/*  ARC REACTOR  reimagined  */
#reactor{position:relative;width:240px;height:240px;z-index:3}
.reactor-ring{position:absolute;border-radius:50%;border:1.5px solid transparent;
  top:50%;left:50%;transform:translate(-50%,-50%)}
#ring-1{width:240px;height:240px;border-color:rgba(0,100,180,.15);
  border-top-color:var(--arc);border-left-color:rgba(0,180,255,.4);animation:spin 4s linear infinite}
#ring-2{width:200px;height:200px;border-color:rgba(0,80,140,.1);
  border-bottom-color:var(--holo);border-right-color:rgba(0,255,220,.3);animation:spinR 6s linear infinite}
#ring-3{width:162px;height:162px;border-color:rgba(0,60,100,.12);
  border-top-color:rgba(0,180,255,.5);animation:spin 3s linear infinite}
#ring-4{width:126px;height:126px;border-color:rgba(0,50,80,.1);
  border-left-color:rgba(0,255,220,.3);animation:spinR 8s linear infinite}
#ring-5{width:92px;height:92px;border-color:rgba(0,180,255,.08);
  border-top-color:var(--arc);border-bottom-color:var(--holo);animation:spin 5s linear infinite}
.reactor-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  border-radius:50%;width:140px;height:140px;
  background:radial-gradient(circle,rgba(0,180,255,.12) 0%,transparent 70%);
  animation:breathe 2.5s ease-in-out infinite}
#reactor-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(circle,#40e0ff 0%,#0080cc 40%,#002040 100%);
  box-shadow:0 0 30px var(--arc),0 0 60px rgba(0,140,220,.4);
  animation:ringPulse 2.5s ease-in-out infinite;
  display:flex;align-items:center;justify-content:center}
#reactor-dot{width:12px;height:12px;border-radius:50%;background:white;
  box-shadow:0 0 10px white,0 0 20px var(--arc)}

/*  Hex segments around reactor  */
.hex-seg{position:absolute;top:50%;left:50%;width:16px;height:8px;
  background:rgba(0,180,255,.15);border:1px solid rgba(0,180,255,.2);
  transform-origin:0 0;border-radius:1px;transition:all .3s}

/*  STATUS  */
#status-row{display:flex;align-items:center;gap:10px;margin-top:14px;position:relative;z-index:4}
#status-dot{width:10px;height:10px;border-radius:50%;transition:all .3s}
#status-label{font-family:var(--font-head);font-size:12px;letter-spacing:4px;
  font-weight:500;transition:color .3s}

/*  WAVEFORM  */
#wave-wrap{width:260px;height:40px;margin-top:8px;position:relative;z-index:4}
#wave-canvas{width:100%;height:100%}

/*  RESPONSE TEXT  */
#response-wrap{max-width:360px;text-align:center;margin-top:6px;min-height:32px;position:relative;z-index:4}
#response-text{font-family:var(--font-data);font-size:11px;color:var(--core);
  line-height:1.6;font-weight:300;opacity:.85}
#response-tool{font-family:var(--font-data);font-size:8px;color:var(--holo);
  letter-spacing:3px;margin-top:2px;font-weight:300}

/*  CHAT INPUT  */
#chat-area{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  width:420px;display:none;gap:6px;z-index:20;animation:slideUp .3s ease}
#chat-area.open{display:flex}
#chat-input{flex:1;background:rgba(0,20,40,.9);border:1px solid var(--arc2);
  color:var(--arc);font-family:var(--font-data);font-size:12px;font-weight:300;
  padding:8px 14px;outline:none;letter-spacing:1px;border-radius:2px}
#chat-input:focus{border-color:var(--arc);box-shadow:0 0 10px rgba(0,180,255,.2)}
#chat-input::placeholder{color:var(--arc3)}
#chat-send{background:rgba(0,100,180,.2);border:1px solid var(--arc);color:var(--arc);
  padding:8px 16px;cursor:pointer;font-family:var(--font-data);font-size:10px;
  letter-spacing:2px;font-weight:400;border-radius:2px;transition:all .2s}
#chat-send:hover{background:rgba(0,180,255,.25)}

/*  FEATURE GRID (bottom of panels)  */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:6px}
.feat-btn{background:rgba(0,20,40,.6);border:1px solid rgba(0,80,160,.2);
  padding:8px 6px;cursor:pointer;transition:all .25s;text-align:center;position:relative;
  overflow:hidden;border-radius:2px}
.feat-btn:hover{background:rgba(0,60,120,.3);border-color:var(--arc);
  box-shadow:inset 0 0 20px rgba(0,180,255,.1)}
.feat-btn:active{background:rgba(0,100,180,.3)}
.feat-btn.danger:hover{border-color:var(--red);box-shadow:inset 0 0 20px rgba(255,40,20,.1)}
.feat-btn.gold:hover{border-color:var(--gold);box-shadow:inset 0 0 20px rgba(240,200,60,.08)}
.feat-btn.active{border-color:var(--holo);background:rgba(0,60,80,.4);animation:breathe 2s infinite}
.feat-icon{font-size:10px;display:block;margin-bottom:2px;font-family:var(--font-head);letter-spacing:1px;color:var(--holo)}
.feat-label{font-family:var(--font-data);font-size:7px;letter-spacing:2px;color:var(--arc2);
  font-weight:300;display:block}
.feat-btn:hover .feat-label{color:var(--core)}
/* INTEL BULLETIN BOARD */
#intel-board{margin-top:4px;max-height:122px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
#intel-board::-webkit-scrollbar{width:2px}
#intel-board::-webkit-scrollbar-thumb{background:var(--arc3);border-radius:2px}
.intel-item{border:1px solid rgba(0,90,180,.25);background:rgba(0,25,48,.45);padding:4px 6px;border-radius:2px}
.intel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.intel-tag{font-size:7px;letter-spacing:2px;color:var(--holo);font-family:var(--font-data)}
.intel-time{font-size:7px;letter-spacing:1px;color:var(--arc2);font-family:var(--font-data)}
.intel-text{font-size:9px;line-height:1.4;color:var(--core);font-family:var(--font-data)}

/* Single-column features */
.feat-wide{grid-column:1/-1}

/*  FOOTER  */
#footer{grid-column:1/-1;grid-row:3;display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-top:1px solid rgba(0,80,160,.2);
  background:linear-gradient(0deg,rgba(0,15,30,.5),transparent)}
#ticker{font-family:var(--font-data);font-size:9px;color:var(--arc2);letter-spacing:2px;
  font-weight:300;animation:pulse 5s ease-in-out infinite}
#footer-net{display:flex;gap:14px;font-family:var(--font-data);font-size:9px;color:var(--arc3);
  font-weight:300}
#footer-net span{color:var(--core);font-weight:400}
#footer-ver{font-family:var(--font-data);font-size:8px;color:rgba(0,80,140,.5);
  letter-spacing:2px;font-weight:200}

/*  MODAL  */
#modal{position:fixed;inset:0;z-index:200;display:none;
  background:rgba(2,10,18,.88);align-items:center;justify-content:center;
  backdrop-filter:blur(4px)}
#modal.open{display:flex}
#modal-box{background:rgba(5,18,30,.97);border:1px solid var(--arc2);
  min-width:480px;max-width:660px;max-height:75vh;display:flex;flex-direction:column;
  border-radius:3px;box-shadow:0 0 40px rgba(0,80,180,.15)}
#modal-head{display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid rgba(0,80,160,.3)}
#modal-title{font-family:var(--font-head);font-size:12px;letter-spacing:4px;
  color:var(--arc);font-weight:600}
#modal-close{cursor:pointer;color:var(--arc3);font-size:18px;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;border:1px solid var(--arc3);
  border-radius:2px;transition:all .2s}
#modal-close:hover{color:var(--red);border-color:var(--red)}
#modal-body{padding:16px;overflow-y:auto;font-size:11px;color:var(--core);
  line-height:1.8;flex:1;font-family:var(--font-data);font-weight:300}
#modal-body::-webkit-scrollbar{width:2px}
#modal-body::-webkit-scrollbar-thumb{background:var(--arc3);border-radius:2px}

/*  STATUS COLORS  */
.st-standby #status-dot{background:var(--arc2);box-shadow:0 0 8px var(--arc2)}
.st-standby #status-label{color:var(--arc2)}
.st-listening #status-dot{background:var(--green);box-shadow:0 0 12px var(--green)}
.st-listening #status-label{color:var(--green)}
.st-thinking #status-dot{background:var(--amber);box-shadow:0 0 12px var(--amber);animation:pulse .5s infinite}
.st-thinking #status-label{color:var(--amber)}
.st-speaking #status-dot{background:var(--arc);box-shadow:0 0 16px var(--arc);animation:pulse .3s infinite}
.st-speaking #status-label{color:var(--arc)}
.st-alert #status-dot{background:var(--red);box-shadow:0 0 16px var(--red);animation:pulse .25s infinite}
.st-alert #status-label{color:var(--red)}

/*  NETWORK GRAPH  */
#net-canvas{width:100%;height:44px}

/*  MEM VIZ  */
.mem-grid{display:flex;gap:2px;flex-wrap:wrap;margin-top:4px}
.mem-cell{width:7px;height:7px;border-radius:1px;background:rgba(0,40,80,.4);transition:all .4s}
.mem-cell.rule{background:var(--holo);box-shadow:0 0 3px var(--holo)}
.mem-cell.pref{background:var(--arc);box-shadow:0 0 3px var(--arc)}
.mem-cell.fact{background:var(--arc);opacity:.4}

/*  THREAT GAUGE  */
.threat-bar{height:4px;background:rgba(0,50,100,.3);border-radius:2px;overflow:hidden;margin:2px 0}
.threat-fill{height:100%;border-radius:2px;transition:width 1s,background .5s}

/*  TIMELINE  */
.timeline-item{border-left:2px solid var(--arc3);padding-left:8px;margin-bottom:6px;
  font-size:10px;color:var(--arc2);font-weight:300}
.timeline-item .t-time{font-size:8px;color:var(--arc3);letter-spacing:1px}
.timeline-item .t-event{color:var(--core)}

/*  MINI VISUALIZER  */
#mini-viz{display:flex;align-items:flex-end;gap:1px;height:24px;margin:4px 0}
.viz-bar{width:4px;background:var(--arc);border-radius:1px 1px 0 0;transition:height .15s;
  box-shadow:0 0 3px rgba(0,180,255,.3)}

/*  RESPONSIVE  */
@media(max-width:960px){#hud{grid-template-columns:180px 1fr 180px}}

/*  MODAL BUTTON GRID  */
.modal-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.modal-btn{background:rgba(0,30,60,.6);border:1px solid var(--arc3);color:var(--arc);
  padding:10px;cursor:pointer;font-family:var(--font-data);font-size:10px;letter-spacing:1px;
  font-weight:400;transition:all .2s;border-radius:2px;text-align:center}
.modal-btn:hover{background:rgba(0,60,120,.4);border-color:var(--arc)}
.modal-btn.red{border-color:rgba(255,40,20,.3);color:var(--red)}
.modal-btn.red:hover{background:rgba(80,0,0,.3);border-color:var(--red)}

/*  HUD WIDGETS  */
.widget-card{background:rgba(0,15,30,.6);border:1px solid rgba(0,80,160,.15);
  padding:8px;border-radius:2px;margin-bottom:6px}

#status-row{margin-top:18px}

}

function spawnBootNodes(intensity = 1) {
  if (!bootNodes) return;
  const count = Math.max(1, Math.min(5, intensity));
  const centerX = window.innerWidth * 0.5;
  const centerY = window.innerHeight * 0.5;
  for (let i = 0; i < count; i++) {
    const n = document.createElement('div');
    n.className = 'boot-node';
    const angle = Math.random() * Math.PI * 2;
    const radius = 76 + Math.random() * 160;
    n.style.left = (centerX + Math.cos(angle) * radius) + 'px';
    n.style.top = (centerY + Math.sin(angle) * radius) + 'px';
    bootNodes.appendChild(n);
    setTimeout(() => n.remove(), 520);
  }
}

function flashBoot() {
  const flash = document.createElement('div');

}

function bootStep() {
  if (bootIdx >= BOOT_MSGS.length) {
    flashBoot();
    spawnBootNodes(5);
    document.getElementById('boot').classList.add('done');
    setTimeout(() => { document.getElementById('boot').style.display = 'none'; }, 800);
    document.getElementById('hud').classList.add('visible');
    return;
  }
  const progress = ((bootIdx + 1) / BOOT_MSGS.length) * 100;
  const pace = bootIdx < 2 ? 380 : bootIdx < 7 ? 220 : 150;
  bootBar.style.width = progress + '%';
  bootMsg.textContent = BOOT_MSGS[bootIdx++];
  spawnBootNodes(Math.round(progress / 24) + 1);

function pushIntel(tag, message) {
  const msg = (message || '').toString().replace(/[^\x20-\x7E]/g, ' ').replace(/\s+/g, ' ').trim();
  if (!msg) return;
  const prev = intelFeed[0];
  if (prev && prev.tag === tag && prev.message === msg) return;
  intelFeed.unshift({
    tag: (tag || 'INTEL').toUpperCase().slice(0, 10),
    message: msg.slice(0, 180),
    time: new Date().toLocaleTimeString('en-US', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'})
  });
  if (intelFeed.length > 20) intelFeed.pop();
  renderIntelBoard();
}

function renderIntelBoard() {
  const box = document.getElementById('intel-board');
  if (!box) return;
  if (!intelFeed.length) {
    box.innerHTML = '<div class="intel-item"><div class="intel-head"><span class="intel-tag">BOOT</span><span class="intel-time">--:--:--</span></div><div class="intel-text">Standing by for retrieved intel.</div></div>';
    return;

  box.innerHTML = intelFeed.slice(0, 8).map(it =>

  ).join('');
}

  autonomyMode = d.autonomy_mode || autonomyMode || 'guided';

}

// Net graph
const netHistory = {tx: new Array(60).fill(0), rx: new Array(60).fill(0)};
let lastTx = 0, lastRx = 0;
// Performance history for FEATURE 9

function applySys(d) {

  document.getElementById('mem-facts').textContent = d.mem_facts || 0;

    ).join('');
  } else {
    pl.innerHTML = '';
  }
  renderProjectBackboard();

  // Threat
  updateThreatMatrix(cpu, ram, tx);
  updateTicker();

  // Performance history
  perfHistory.cpu.push(cpu); perfHistory.ram.push(ram);
  perfHistory.timestamps.push(new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit'}));

function renderActionTrace(trace) {

function renderMemVis(rules, prefs, facts) {

    if (i < rules) html += '<div class="mem-cell rule"></div>';
    else if (i < rules + prefs) html += '<div class="mem-cell pref"></div>';
    else if (i < rules + prefs + facts) html += '<div class="mem-cell fact"></div>';
    else html += '<div class="mem-cell"></div>';
  }
  vis.innerHTML = html;
}

function drawNetGraph() {
  const c = document.getElementById('net-canvas');
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  ctx.clearRect(0,0,w,h);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,80,160,.1)';
  ctx.lineWidth = 0.5;
  for (let y = 0; y < h; y += 10) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

  const maxT = Math.max(...netHistory.tx, 1);
  const maxR = Math.max(...netHistory.rx, 1);

  // TX area
  ctx.fillStyle = 'rgba(0,180,255,.06)';
  ctx.beginPath();
  ctx.moveTo(0, h);
  netHistory.tx.forEach((v,i) => {
    const x = (i / netHistory.tx.length) * w;
    const y = h - (v / maxT) * (h - 4) - 2;
    ctx.lineTo(x,y);
  });
  ctx.lineTo(w, h);
  ctx.fill();

  // TX line
  ctx.strokeStyle = 'rgba(0,200,255,.8)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  netHistory.tx.forEach((v,i) => {
    const x = (i / netHistory.tx.length) * w;
    const y = h - (v / maxT) * (h - 4) - 2;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();

  // RX line
  ctx.strokeStyle = 'rgba(0,255,180,.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  netHistory.rx.forEach((v,i) => {
    const x = (i / netHistory.rx.length) * w;
    const y = h - (v / maxR) * (h - 4) - 2;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.stroke();
}

//  WAVEFORM 
const wc = document.getElementById('wave-canvas');
const wx = wc.getContext('2d');

function drawWave() {
  wc.width = wc.offsetWidth; wc.height = wc.offsetHeight;
  const W = wc.width, H = wc.height, my = H/2, t = Date.now()/1000;
  const amp = isTalking ? 24 : 3;

  for (let i = 0; i < waveBuf.length; i++) {
    const tgt = amp * Math.sin(t * 3 + i * 0.25) * Math.sin(i * Math.PI / waveBuf.length);
    const noise = isTalking ? (Math.random()-.5)*8 : 0;
    waveBuf[i] += (tgt + noise - waveBuf[i]) * .2;
  }

  wx.clearRect(0,0,W,H);
  const step = W / (waveBuf.length - 1);

  // Glow layers
  [[8,'rgba(0,60,120,.1)'],[4,'rgba(0,160,220,.35)'],[1.5,isTalking?'#00ffe0':'#00b8ff']].forEach(([lw,col]) => {
    wx.strokeStyle = col; wx.lineWidth = lw; wx.beginPath();
    waveBuf.forEach((v,i) => { const x=i*step, y=my+v; i===0?wx.moveTo(x,y):wx.lineTo(x,y); });
    wx.stroke();
  });

  // Center dot
  const dc = isTalking ? '#00ffe0' : '#00b8ff';
  wx.shadowColor = dc; wx.shadowBlur = 12;
  wx.fillStyle = dc;
  wx.beginPath(); wx.arc(W/2, my, 4, 0, Math.PI*2); wx.fill();
  wx.shadowBlur = 0;
  requestAnimationFrame(drawWave);
}
drawWave();

  ca.classList.toggle('open', !open);
  btn.classList.toggle('active', !open);
  if (!open) document.getElementById('chat-input').focus();
}

async function sendChat() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  try {
    await fetch(API+'/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  } catch(e) {
    try { await fetch(API+'/command', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cmd:'quick_action',arg:text})}); } catch(e2) {}
  }
}

document.getElementById('chat-input').addEventListener('keydown', e => {

});

// Intercept state changes for timeline
let prevTimelineStatus = '';
const origApplyState = applyState;
applyState = function(d) {
  origApplyState(d);
  const st = d.status||'standby';
  if (st !== prevTimelineStatus) {
    if (st === 'listening') logActivity('Wake word detected  LISTENING');
    else if (st === 'thinking') logActivity('Processing request  ' + (d.tool||'BRAIN'));
    else if (st === 'speaking') logActivity('Speaking: ' + (d.text||'').substring(0,60));
    else if (st === 'alert') logActivity('ALERT triggered');
    prevTimelineStatus = st;
  }
};

  openModal('DEEP DIVE OSINT', '<div style="color:var(--amber)">Running deep dive on <b>' + target + '</b>...</div>');
  fetch(API+'/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'deep dive on ' + target})});
  setTimeout(async () => {
    try {
      const r = await fetch(API+'/deep-dive-report'); const d = await r.json();
      if (d && d.target && d.sections) {
        let html = '<div style="color:var(--holo);font-size:10px;letter-spacing:2px;margin-bottom:8px">TARGET: ' + d.target.toUpperCase() + ' | ' + d.timestamp + ' | ' + d.elapsed_seconds + 's</div>';
        html += '<div style="color:var(--core);font-size:11px;margin-bottom:12px">' + d.summary + '</div>';
        for (const [key, section] of Object.entries(d.sections)) {
          html += '<div style="color:var(--arc);font-size:9px;letter-spacing:2px;margin:6px 0 4px;border-bottom:1px solid rgba(0,80,160,.2)">' + key.toUpperCase().replace(/_/g, ' ') + '</div>';
          if (key === 'username_search' && section.sites) {
            html += '<div style="font-size:9px;color:var(--arc2)">Profiles: ' + section.profiles_found + '</div>';
            let count = 0;
            for (const [site, url] of Object.entries(section.sites)) {
              if (count++ > 15) { html += '<div style="font-size:8px;color:var(--arc3)">+' + (Object.keys(section.sites).length - 15) + ' more...</div>'; break; }
              html += '<div style="font-size:9px;padding:1px 0"><span style="color:var(--holo)">' + site + '</span> <span style="color:var(--arc2)">' + url + '</span></div>';
            }
          } else if (key === 'email_intel') {
            if (section.breaches && section.breaches.length) html += '<div style="color:var(--red);font-size:9px">Breached in ' + section.total_breaches + ' databases</div>';
            if (section.reputation) html += '<div style="font-size:9px;color:var(--arc2)">Reputation: ' + (section.reputation.reputation || 'unknown') + ' | Suspicious: ' + (section.reputation.suspicious || 'no') + '</div>';
          } else if (key === 'phone_intel' && section.carrier) {
            html += '<div style="font-size:9px;color:var(--arc2)">Carrier: ' + section.carrier + ' | Type: ' + (section.line_type || 'unknown') + '</div>';
          } else if (key === 'people_search') {
            for (const [source, entries] of Object.entries(section)) {
              html += '<div style="font-size:9px;color:var(--arc2)">' + source + ': ' + entries.length + ' records</div>';
              entries.slice(0, 2).forEach(e => html += '<div style="font-size:8px;color:var(--core);padding-left:8px">' + e.slice(0, 120) + '</div>');
            }
          } else if (key === 'detailed_profiles') {
            for (const [platform, prof] of Object.entries(section)) {
              html += '<div style="font-size:9px;color:var(--holo)">' + platform.toUpperCase() + '</div>';
              for (const [k, v] of Object.entries(prof)) if (v) html += '<div style="font-size:8px;color:var(--arc2);padding-left:8px">' + k + ': ' + v + '</div>';
            }
          } else if (key === 'cross_references') {
            for (const [source, refs] of Object.entries(section)) html += '<div style="font-size:9px;color:var(--amber)">' + source + ' -> ' + JSON.stringify(refs).slice(0, 100) + '</div>';
          }
        }
        openModal('DEEP DIVE REPORT: ' + d.target.toUpperCase(), html);
      }
    } catch(e) {}
  }, 15000);
}

// 
//  FEATURE 12: REVELATIONS PROTOCOL 
// 
let revClicks = 0, revTimer = null;
function activateRevelations() {
  revClicks++;
  if (revClicks < 2) {
    document.querySelector('#rev-tile .feat-label').textContent = 'CONFIRM?';
    revTimer = setTimeout(() => { revClicks = 0; document.querySelector('#rev-tile .feat-label').textContent = 'REVELATIONS'; }, 3000);
    return;
  }
  clearTimeout(revTimer);
  document.body.style.animation = 'glitch .15s 6';
  setTimeout(async () => {
    try { await fetch(API+'/kill'); } catch(e) {}
    window.close();
  }, 600);
}

// 
//  FEATURE 13: KEYBOARD SHORTCUTS 
// 
document.addEventListener('keydown', e => {
  if (e.target.id === 'chat-input') return;
  if (e.key === '/' || e.key === 'c') { e.preventDefault(); toggleChat(); }
  if (e.key === 'p') showProtocols();
  if (e.key === 'd') showHealth();
  if (e.key === 'm') showMemory();
  if (e.key === 't') showTimeline();
  if (e.key === 'w') showWeather();
  if (e.key === 'Escape') closeModal();
  if (e.key === 's') cmd('screenshot');
  if (e.key === 'l') cmd('lock');
});

// 
//  FEATURE 14: AUTO-REFRESH & RECONNECT 
// 
let connectionLost = false;
let reconnectAttempts = 0;
const origPollState = pollState;

async function pollStateWithReconnect() {
  try {
    const r = await fetch(API + '/state', {cache:'no-store'});
    const d = await r.json();
    applyState(d);
    if (connectionLost) {
      connectionLost = false;
      reconnectAttempts = 0;
      logActivity('Connection restored to JARVIS backend');
      document.querySelector('.h-status-dot').style.background = 'var(--green)';
      document.querySelector('.h-status-dot').style.boxShadow = '0 0 8px var(--green)';
    }
  } catch(e) {
    if (!connectionLost) {
      connectionLost = true;
      logActivity('Connection lost to JARVIS backend');
      document.querySelector('.h-status-dot').style.background = 'var(--red)';
      document.querySelector('.h-status-dot').style.boxShadow = '0 0 8px var(--red)';
    }
    reconnectAttempts++;
  }
  setTimeout(pollStateWithReconnect, connectionLost ? Math.min(2000 * reconnectAttempts, 10000) : 250);
}

// 
//  FEATURE 15: HUD THEME MODES 
// 
// Right-click cycles: STARK / COMBAT / STEALTH
const THEMES = {
  stark: { arc:'#00b8ff', arc2:'#0066cc', holo:'#00ffe0', bg:'#020a12' },
  combat: { arc:'#ff4020', arc2:'#cc2200', holo:'#ff8800', bg:'#0a0204' },
  stealth: { arc:'#30ff60', arc2:'#00aa30', holo:'#80ff80', bg:'#020a04' },
};
let themeIdx = 0;
const themeNames = Object.keys(THEMES);

document.addEventListener('contextmenu', e => {
  if (e.target.closest('#modal')) return;
  e.preventDefault();
  themeIdx = (themeIdx + 1) % themeNames.length;
  const t = THEMES[themeNames[themeIdx]];
  document.documentElement.style.setProperty('--arc', t.arc);
  document.documentElement.style.setProperty('--arc2', t.arc2);
  document.documentElement.style.setProperty('--holo', t.holo);
  document.documentElement.style.setProperty('--bg', t.bg);
  logActivity('Theme changed: ' + themeNames[themeIdx].toUpperCase() + ' MODE');
});

//  START 
setTimeout(() => { pollStateWithReconnect(); pollSys(); }, 600);
